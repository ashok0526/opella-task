name: Terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
          - all
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read

env:
  TF_VERSION: "1.10.5"
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  terraform-dev:
    name: "Terraform ${{ inputs.action }} (dev)"
    runs-on: ubuntu-latest
    needs: terraform-fmt
    if: inputs.environment == 'dev' || inputs.environment == 'all'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: environments/dev
        run: terraform plan -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" -var="vm_ssh_public_key=${{ secrets.VM_SSH_PUBLIC_KEY }}"

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: environments/dev
        run: terraform apply -auto-approve -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" -var="vm_ssh_public_key=${{ secrets.VM_SSH_PUBLIC_KEY }}"

  terraform-prod:
    name: "Terraform ${{ inputs.action }} (prod)"
    runs-on: ubuntu-latest
    needs: [terraform-fmt, terraform-dev]
    if: |
      always() &&
      (inputs.environment == 'prod' || inputs.environment == 'all') &&
      (needs.terraform-dev.result == 'success' || needs.terraform-dev.result == 'skipped')
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/prod
        run: terraform init

      - name: Terraform Validate
        working-directory: environments/prod
        run: terraform validate

      - name: Terraform Plan
        working-directory: environments/prod
        run: terraform plan -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" -var="vm_ssh_public_key=${{ secrets.VM_SSH_PUBLIC_KEY }}"

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: environments/prod
        run: terraform apply -auto-approve -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" -var="vm_ssh_public_key=${{ secrets.VM_SSH_PUBLIC_KEY }}"
